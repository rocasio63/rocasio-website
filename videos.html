body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#fff;min-height:100vh}

nav{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:#000;position:sticky;top:0;z-index:100;border-bottom:1px solid #1a1a1a}

.hero{padding:24px 0 0 0}
.hero h1{font-size:2rem;font-weight:800;padding:0 24px;margin-bottom:4px;letter-spacing:-.5px}
.hero p{color:#999;font-size:.9rem;padding:0 24px;margin-bottom:16px}

.video-container{width:100%;background:#000}

.video-meta{padding:16px 24px;background:#111}

.card .info span{color:#666;font-size:.7rem}

footer{text-align:center;padding:20px;border-top:1px solid #1a1a1a;color:#444;font-size:.75rem}
footer a{color:#ff6b35;text-decoration:none}

@media(min-width:768px){
