<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1a;color:#e0e0e0;font-family:-apple-system,system-ui,sans-serif;min-height:100vh}
.header{background:#1a1a2e;padding:20px 30px;border-bottom:1px solid #2a2a4a;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.header h1{font-size:1.4em;color:#f0c040}
.header .badge{background:#2a2a4a;padding:6px 14px;border-radius:20px;font-size:.8em;color:#aaa}
.filters{display:flex;gap:10px;padding:15px 20px;flex-wrap:wrap;background:#12122a;border-bottom:1px solid #2a2a4a}
.filters select,.filters input{background:#1a1a2e;color:#e0e0e0;border:1px solid #2a2a4a;padding:8px 12px;border-radius:8px;font-size:.85em}
.filters select:focus,.filters input:focus{outline:none;border-color:#f0c040}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;padding:15px 20px}
.stat{background:#1a1a2e;border-radius:10px;padding:14px;border:1px solid #2a2a4a;text-align:center}
.stat .label{font-size:.7em;color:#888;text-transform:uppercase;letter-spacing:1px}
.stat .value{font-size:1.6em;font-weight:bold;margin:4px 0}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:15px 20px}
.chart-card{background:#1a1a2e;border-radius:12px;padding:16px;border:1px solid #2a2a4a}
.chart-card h2{font-size:.8em;color:#888;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.chart-wrap{position:relative;height:340px}
.table-wrap{padding:0 20px 20px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.82em}
th{text-align:left;padding:8px 6px;color:#888;border-bottom:1px solid #2a2a4a;font-size:.75em;position:sticky;top:0;background:#0f0f1a}
td{padding:7px 6px;border-bottom:1px solid #1a1a2e}
tr:hover{background:#1a1a2e}
.cat{padding:2px 8px;border-radius:10px;font-size:.7em;font-weight:bold;display:inline-block}
.cat-supermercado{background:#1b5e20;color:#69f0ae}
.cat-alcohol{background:#4a148c;color:#ce93d8}
.cat-restaurant{background:#b71c1c;color:#ff8a80}
.cat-mascotas{background:#1a237e;color:#64b5f6}
.cat-efectos{background:#e65100;color:#ffcc80}
.cat-regalos{background:#880e4f;color:#f48fb1}
.green{color:#4caf50}.yellow{color:#f0c040}.red{color:#f44336}.blue{color:#64b5f6}
@media(max-width:700px){.charts{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
canvas{width:100%!important}
</style>
</head>

function $(v){return parseFloat(String(v||'0').replace(/[$,]/g,''))||0}

var COLORS={Supermercado:'#4caf50',Alcohol:'#ce93d8',Restaurant:'#ff8a80',Mascotas:'#64b5f6','Efectos Personales':'#ffcc80',Regalos:'#f48fb1'};
var CATCLASS={Supermercado:'cat-supermercado',Alcohol:'cat-alcohol',Restaurant:'cat-restaurant',Mascotas:'cat-mascotas','Efectos Personales':'cat-efectos',Regalos:'cat-regalos'};

var months=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
function monthKey(d){var p=d.split('/');return p[2]+'-'+p[0];}
function monthLabel(k){var p=k.split('-');return months[parseInt(p[1])-1]+' '+p[0].slice(2);}

// Populate filters
var cats=new Set(),mons=new Set();
DATA.forEach(function(r){cats.add(r[6]);mons.add(monthKey(r[0]));});
var fCat=document.getElementById('fCat');
[...cats].sort().forEach(function(c){var o=document.createElement('option');o.value=c;o.textContent=c;fCat.appendChild(o);});
var fMonth=document.getElementById('fMonth');
[...mons].sort().forEach(function(m){var o=document.createElement('option');o.value=m;o.textContent=monthLabel(m);fMonth.appendChild(o);});

var pieChart,barChart;

function render(){
  var fc=fCat.value,fm=fMonth.value,fs=fSearch.value.toLowerCase();
  var rows=DATA.filter(function(r){
    if(fc&&r[6]!==fc)return false;
    if(fm&&monthKey(r[0])!==fm)return false;
    if(fs&&(r[1].toLowerCase().indexOf(fs)===-1&&r[2].toLowerCase().indexOf(fs)===-1))return false;
    return true;
  });

  // Stats
  var total=rows.reduce(function(s,r){return s+$(r[5])},0);
  var ivu=rows.reduce(function(s,r){return s+$(r[4])},0);
  var precio=rows.reduce(function(s,r){return s+$(r[3])},0);
  var prom=rows.length?total/rows.length:0;
  document.getElementById('stats').innerHTML=
    '<div class="stat"><div class="label">Items</div><div class="value yellow">'+rows.length+'</div></div>'+
    '<div class="stat"><div class="label">Total</div><div class="value green">$'+total.toFixed(2)+'</div></div>'+
    '<div class="stat"><div class="label">Subtotal</div><div class="value blue">$'+precio.toFixed(2)+'</div></div>'+
    '<div class="stat"><div class="label">IVU</div><div class="value" style="color:#ff8a80">$'+ivu.toFixed(2)+'</div></div>'+
    '<div class="stat"><div class="label">Promedio</div><div class="value" style="color:#aaa">$'+prom.toFixed(2)+'</div></div>';

  // Pie by category
  var catData={};
  rows.forEach(function(r){catData[r[6]]=(catData[r[6]]||0)+$(r[5]);});
  var catLabels=Object.keys(catData).sort(function(a,b){return catData[b]-catData[a]});
  var catValues=catLabels.map(function(c){return catData[c]});
  var catColors=catLabels.map(function(c){return COLORS[c]||'#888'});
  var catTotal=catValues.reduce(function(a,b){return a+b},0);

  if(pieChart)pieChart.destroy();
  pieChart=new Chart(document.getElementById('pieChart'),{
    type:'pie',
    data:{labels:catLabels,datasets:[{data:catValues,backgroundColor:catColors,borderColor:'#0f0f1a',borderWidth:2}]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:function(ctx){var v=ctx.raw;var pct=(v/catTotal*100).toFixed(1);return ctx.label+': $'+v.toFixed(2)+' ('+pct+'%)';}}},
        datalabels:{color:'#e0e0e0',font:{weight:'bold',size:11},formatter:function(value,ctx){var pct=(value/catTotal*100).toFixed(1);var lbl=ctx.chart.data.labels[ctx.dataIndex];return lbl+': $'+value.toFixed(0)+' ('+pct+'%)';},anchor:'end',align:'end',offset:8,clamp:true,connectorColor:'#555',connectorWidth:1.5}
      }
    },
    plugins:[ChartDataLabels]
  });

  // Bar by month
  var monData={};
  rows.forEach(function(r){var k=monthKey(r[0]);monData[k]=(monData[k]||0)+$(r[5]);});
  var monLabels=Object.keys(monData).sort();
  var monValues=monLabels.map(function(m){return monData[m]});
  monLabels=monLabels.map(monthLabel);

  if(barChart)barChart.destroy();
  barChart=new Chart(document.getElementById('barChart'),{
    type:'bar',
    data:{labels:monLabels,datasets:[{data:monValues,backgroundColor:'#f0c040',borderRadius:6}]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},datalabels:{display:false},
        tooltip:{callbacks:{label:function(ctx){return'$'+ctx.raw.toFixed(2);}}}},
      scales:{y:{ticks:{color:'#888',callback:function(v){return'$'+v}},grid:{color:'#1a1a2e'}},x:{ticks:{color:'#888'},grid:{display:false}}}
    }
  });

  // Table
  var tbody=document.getElementById('tbody');
  tbody.innerHTML='';
  rows.forEach(function(r){
    var catClass=CATCLASS[r[6]]||'';
    tbody.innerHTML+='<tr><td>'+r[0]+'</td><td>'+r[1]+'</td><td>'+r[2]+'</td><td style="text-align:right">'+r[3]+'</td><td style="text-align:right">'+r[4]+'</td><td style="text-align:right;font-weight:bold">'+r[5]+'</td><td><span class="cat '+catClass+'">'+r[6]+'</span></td><td style="color:#888;font-size:.8em">'+r[7]+'</td></tr>';
  });

  document.getElementById('updated').textContent='Actualizado: '+new Date().toLocaleDateString('es-PR');
}

document.getElementById('fCat').onchange=render;
document.getElementById('fMonth').onchange=render;
document.getElementById('fSearch').oninput=render;
render();
</script>
